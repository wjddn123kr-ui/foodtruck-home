<style>

  .hero{padding:130px 0 70px;position:relative}
  .tagline{display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:var(--acc2);border:1px solid rgba(0,224,199,.35);background:rgba(0,224,199,.07);padding:7px 15px;border-radius:30px;margin-bottom:26px}
  h1{font-size:clamp(44px,8vw,104px);font-weight:900;line-height:.96;letter-spacing:-.04em;color:#fff}
  h1 em{font-style:normal;background:linear-gradient(92deg,var(--acc2),var(--acc));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .sub{margin-top:24px;font-size:clamp(16px,2vw,19px);color:var(--mut);max-width:44ch}
  .btns{display:flex;gap:12px;margin-top:34px;flex-wrap:wrap}
  .b1{background:var(--acc);color:#fff;font-weight:800;font-size:16px;padding:16px 30px;border-radius:11px;box-shadow:0 14px 40px -12px var(--acc)}
  .b2{border:1px solid var(--line);color:#fff;font-weight:600;padding:16px 26px;border-radius:11px}
  .stats{margin-top:64px;display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .st{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:22px}
  .st .v{font-family:'Archivo';font-weight:800;font-size:clamp(26px,3.4vw,38px);color:#fff;letter-spacing:-.02em}
  .st .v i{font-style:normal;font-size:.45em;color:var(--acc2)}
  .st .l{margin-top:7px;font-size:12.5px;color:var(--mut)}
  .marq{margin-top:18px;border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:22px 0;overflow:hidden;white-space:nowrap}
  .marq span{font-weight:800;font-size:20px;color:rgba(126,132,181,.5);margin:0 26px}
  .tone{position:fixed;left:16px;bottom:16px;z-index:80;background:#fff;color:#000;font-size:12px;font-weight:800;padding:9px 14px;border-radius:30px}
  @media(max-width:820px){.nav{display:none}.stats{grid-template-columns:1fr 1fr}}
