<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>메뉴 — 푸드트럭하우스</title>
<meta name="description" content="커피·음료 세트부터 간식·디저트·분식·식사·출장뷔페까지. 행사 성격과 인원에 맞춰 100종 메뉴를 자유롭게 구성하세요.">
<meta name="theme-color" content="#0A1733">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="apple-touch-icon" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" href="/assets/css/style.css">
<style>
  /* page head */
  .phead{position:relative;padding:138px 0 50px;overflow:hidden}
  .phead .glow{position:absolute;width:460px;height:460px;border-radius:50%;background:rgba(45,91,255,.13);filter:blur(90px);top:-160px;right:-40px;z-index:0}
  .phead::after{content:"";position:absolute;inset:0;z-index:1;pointer-events:none;background-image:radial-gradient(rgba(45,91,255,.13) 1.4px,transparent 1.5px);background-size:26px 26px;-webkit-mask:radial-gradient(130% 90% at 80% 18%,#000,transparent 76%);mask:radial-gradient(130% 90% at 80% 18%,#000,transparent 76%)}
  .phead .wrap{position:relative;z-index:2}
  .crumb{font-size:13.5px;color:#7a87a8;margin-bottom:16px}
  .crumb a:hover{color:var(--blue)}
  .phead h1{font-size:clamp(32px,5vw,52px);font-weight:800;letter-spacing:-.03em;color:var(--navy-900)}
  .phead p{margin-top:16px;font-size:17px;color:#5b6789;max-width:50ch}
  .phead .count{margin-top:22px;display:inline-flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:var(--blue-bright);background:rgba(45,91,255,.1);border:1px solid rgba(45,91,255,.28);padding:7px 15px;border-radius:30px}

  /* tabs */
  .tabs{position:sticky;top:70px;z-index:40;background:rgba(255,255,255,.9);backdrop-filter:blur(14px);border-top:1px solid rgba(10,17,36,.06);border-bottom:1px solid rgba(10,17,36,.06)}
  .tabs-inner{display:flex;gap:7px;overflow-x:auto;padding:14px 0;-ms-overflow-style:none;scrollbar-width:none}
  .tabs-inner::-webkit-scrollbar{display:none}
  .tab{flex:0 0 auto;padding:9px 18px;border-radius:30px;font-size:14.5px;font-weight:600;color:#33406b;border:1px solid #e0e8f6;background:#fff;cursor:pointer;transition:color .2s,background .2s,border-color .2s,box-shadow .2s;white-space:nowrap;font-family:inherit}
  .tab:hover{color:var(--blue);border-color:rgba(45,91,255,.4)}
  .tab.active{background:var(--blue);color:#fff;border-color:var(--blue);box-shadow:0 6px 18px -8px rgba(45,91,255,.85)}

  /* menu body */
  /* 인기 조합 */
  .combos{padding:6px 0 30px}
  .combos-head{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin-bottom:18px}
  .cb-tag{font-size:16px;font-weight:800;color:var(--navy-900);letter-spacing:-.01em}
  .cb-sub{font-size:13px;color:#5b6789}
  .combo-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .combo{position:relative;display:flex;align-items:center;gap:20px;padding:22px 26px 22px 22px;border-radius:18px;background:#fff;border:1px solid #e7edf9;box-shadow:0 12px 32px -20px rgba(13,40,120,.2);overflow:hidden;transition:transform .25s}
  .combo::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(var(--blue),var(--blue-bright))}
  .combo::after{content:"";position:absolute;inset:0;border-radius:18px;box-shadow:inset 0 1px 0 rgba(255,255,255,.06)}
  .combo:hover{transform:translateY(-3px)}
  .combo-no{flex:0 0 auto;font-family:'Archivo',sans-serif;font-weight:800;font-size:48px;line-height:.9;letter-spacing:-.03em;color:transparent;-webkit-text-stroke:1.4px rgba(91,134,255,.55);position:relative;z-index:1}
  .combo-main{flex:1;min-width:0;position:relative;z-index:1}
  .combo-rank{display:inline-block;font-size:11px;font-weight:800;letter-spacing:.02em;color:var(--blue);background:rgba(45,91,255,.12);padding:3px 10px;border-radius:6px;margin-bottom:11px}
  .combo-formula{display:flex;flex-wrap:wrap;align-items:center;gap:9px}
  .combo-formula .ci{font-size:15.5px;font-weight:700;color:var(--navy-900);line-height:1.25}
  .combo-formula .cx{display:inline-grid;place-items:center;width:21px;height:21px;border-radius:50%;background:var(--blue);color:#fff;font-size:13px;font-weight:800;font-family:'Archivo',sans-serif;box-shadow:0 4px 12px -5px rgba(45,91,255,.9)}
  .combo-meta{margin-top:12px;font-size:12.5px;color:#5b6789}
  .now-tag{font-size:11.5px;font-weight:600;color:var(--blue-bright);background:rgba(45,91,255,.12);border:1px solid rgba(45,91,255,.3);padding:2px 9px;border-radius:20px;margin-left:6px}
  @media(max-width:560px){.combo-grid{grid-template-columns:1fr}.combo{gap:15px;padding:18px 20px}.combo-no{font-size:38px}}

  .menu-body{padding:0 0 90px}
  .panel{padding:54px 0 0}
  .panel.hide{display:none}
  .panel-head{margin-bottom:26px}
  .panel-head h2{font-size:clamp(22px,3vw,30px);font-weight:800;letter-spacing:-.03em;color:var(--navy-900)}
  .panel-head p{margin-top:10px;font-size:15px;color:#5b6789;max-width:54ch}
  .pill{display:inline-flex;align-items:center;gap:7px;margin-top:12px;font-size:12.5px;font-weight:600;color:var(--blue-bright);background:rgba(45,91,255,.1);border:1px solid rgba(45,91,255,.28);padding:6px 13px;border-radius:30px}

  /* simple item grid */
  .mgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  .mc{background:#fff;border:1px solid #e7edf9;border-radius:16px;overflow:hidden;box-shadow:0 12px 30px -20px rgba(13,40,120,.18);transition:transform .2s,border-color .2s,box-shadow .2s}
  .mc:hover{transform:translateY(-4px);border-color:rgba(91,134,255,.42)}
  .mc-th{position:relative;aspect-ratio:16/10;display:grid;place-items:center;background:radial-gradient(circle at 50% 32%,rgba(91,134,255,.14),transparent 60%),linear-gradient(160deg,#eaf0fc,#dbe6f7);border-bottom:1px solid #eef2fb}
  .mc-th img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .mc-th img.mc-img{object-fit:contain;background:#fff;padding:6px}
  .mc-emoji{font-size:42px;line-height:1;opacity:.95}
  .mc-best{position:absolute;top:10px;left:10px;z-index:2;background:var(--blue);color:#fff;font-size:10.5px;font-weight:800;padding:3px 8px;border-radius:6px;letter-spacing:.03em;box-shadow:0 4px 12px -4px rgba(45,91,255,.7)}
  .mc-b{padding:13px 15px;display:flex;align-items:center;justify-content:space-between;gap:10px}
  .mc-n{font-size:14.5px;font-weight:600;color:#33406b;line-height:1.35}
  .mc-p{font-size:15.5px;font-weight:700;color:var(--navy-900);white-space:nowrap}
  .mc-p i{font-style:normal;font-size:12px;color:#5b6789;margin-left:2px;font-weight:600}

  /* subgroup heading (식사) */
  .sub{margin:34px 0 16px;font-size:16px;font-weight:700;color:var(--navy-900);display:flex;align-items:center;gap:11px}
  .sub:first-child{margin-top:0}
  .sub::before{content:"";width:4px;height:17px;background:var(--blue);border-radius:2px}

  /* drink sets */
  .set-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
  .set-card{background:#fff;border:1px solid #e7edf9;box-shadow:0 14px 36px -22px rgba(13,40,120,.22);border-radius:18px;padding:26px;transition:border-color .25s,box-shadow .25s}
  .set-card:hover{border-color:rgba(91,134,255,.4)}
  .set-top{display:flex;align-items:baseline;justify-content:space-between;gap:12px;padding-bottom:16px;border-bottom:1px solid #eef2fb;margin-bottom:18px}
  .set-top h3{font-size:19px;font-weight:800;letter-spacing:-.02em;color:var(--navy-900)}
  .set-price{font-size:22px;font-weight:800;color:var(--blue)}
  .set-price i{font-style:normal;font-size:13px;color:#5b6789;font-weight:600;margin-left:2px}
  .set-grp{margin-bottom:15px}
  .set-grp:last-child{margin-bottom:0}
  .set-grp .gl{font-size:12px;font-weight:700;color:#5b6789;margin-bottom:9px;letter-spacing:.03em}
  .chips{display:flex;flex-wrap:wrap;gap:7px}
  .chip{font-size:13px;color:#33406b;background:#eef3fc;border:1px solid #e0e8f6;padding:5px 11px;border-radius:20px}

  /* buffet */
  .buf-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  .buf{background:#fff;border:1px solid #e7edf9;box-shadow:0 14px 36px -22px rgba(13,40,120,.22);border-radius:18px;padding:30px 26px;text-align:center;position:relative;transition:transform .25s,border-color .25s,box-shadow .25s}
  .buf:hover{transform:translateY(-4px)}
  .buf.mid{border-color:rgba(91,134,255,.5);box-shadow:0 18px 46px -28px rgba(45,91,255,.8)}
  .buf .tier{font-size:34px;font-weight:800;letter-spacing:-.02em;color:var(--blue-bright);line-height:1}
  .buf .comp{margin-top:14px;color:#5b6789;font-size:14px;line-height:1.6;min-height:44px}
  .buf .bp{margin-top:18px;padding-top:18px;border-top:1px solid #eef2fb;font-size:25px;font-weight:800;color:var(--navy-900)}
  .buf .bp i{font-style:normal;font-size:13px;color:#5b6789;font-weight:600;margin-left:2px}
  .buf-opt{margin-top:18px;background:var(--ice);border:1px solid #e3eaf6;border-radius:18px;padding:8px 28px}
  .opt-row{display:flex;gap:18px;padding:16px 0;border-bottom:1px solid rgba(10,17,36,.08);font-size:14.5px;line-height:1.6}
  .opt-row:last-child{border-bottom:0}
  .opt-row .ok{flex:0 0 92px;color:var(--blue-bright);font-weight:700}
  .opt-row .ov{color:var(--ink)}

  /* season */
  .season-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
  .season-card{background:#fff;border-radius:18px;padding:28px;border:1px solid #e7edf9;box-shadow:0 14px 36px -22px rgba(13,40,120,.2);position:relative;overflow:hidden}
  .season-card::before{content:"";position:absolute;width:200px;height:200px;border-radius:50%;filter:blur(60px);top:-60px;right:-50px;z-index:0}
  .season-card.summer::before{background:rgba(45,91,255,.28)}
  .season-card.winter::before{background:rgba(91,134,255,.22)}
  .season-card>*{position:relative;z-index:1}
  .season-tag{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:700;color:var(--blue-bright);margin-bottom:16px}
  .season-grp{margin-top:16px}
  .season-grp .gl{font-size:12px;font-weight:700;color:#5b6789;margin-bottom:9px;letter-spacing:.03em}

  /* CTA */
  .cta-wrap{padding:0 0 110px}
  .cta{max-width:var(--max);margin:0 auto;border-radius:24px;padding:clamp(40px,5vw,60px);background:linear-gradient(135deg,var(--blue),var(--blue-deep));position:relative;overflow:hidden;text-align:center}
  .cta::before{content:"";position:absolute;width:300px;height:300px;border-radius:50%;background:rgba(255,255,255,.12);top:-100px;right:-50px;filter:blur(10px)}
  .cta h2{font-size:clamp(24px,3.4vw,36px);font-weight:800;letter-spacing:-.03em;color:#fff;position:relative}
  .cta p{margin-top:14px;font-size:16px;color:rgba(255,255,255,.85);position:relative}
  .cta a{display:inline-block;margin-top:28px;background:#fff;color:var(--blue-deep);padding:16px 32px;border-radius:12px;font-weight:800;font-size:16px;position:relative;transition:transform .15s}
  .cta a:hover{transform:translateY(-2px)}

  @media(max-width:900px){
    .mgrid{grid-template-columns:1fr 1fr}.set-grid{grid-template-columns:1fr}.buf-grid{grid-template-columns:1fr}.season-grid{grid-template-columns:1fr}
  }
  @media(max-width:560px){
    .mgrid{grid-template-columns:repeat(3,1fr);gap:8px}
    .mc-b{flex-direction:column;align-items:flex-start;gap:1px;padding:7px 8px 9px}
    .mc-n{font-size:11px;line-height:1.3}
    .mc-p{font-size:11.5px}
    .mc-p i{font-size:9px;margin-left:1px}
    .mc-best{font-size:9px;padding:2px 6px;top:6px;left:6px}
    .mc-th img.mc-img{padding:4px}
    .buf .comp{min-height:0}
  }
  @media(max-width:600px){
    .phead{padding:100px 0 40px}
    .phead h1{font-size:clamp(27px,7.4vw,42px);line-height:1.18}
    .phead p,.phead .sub{font-size:15px;margin-top:13px;line-height:1.65}
    section{padding-top:clamp(54px,12vw,80px);padding-bottom:clamp(54px,12vw,80px)}
    .sec-head{margin-bottom:30px}
    h2.st{font-size:clamp(22px,6.3vw,32px);line-height:1.22}
    .sec-head p{font-size:15px;line-height:1.65}
  }

  /* ===== 메뉴 탭 전용 따뜻한 색감(식욕 자극) — index 등 다른 페이지엔 영향 없음 ===== */
  body{
    --blue:#ED4C1C;--blue-bright:#FF7A2E;--blue-deep:#BE380F;--ice:#FFF1E8;
    background-color:#FFF8F2;
    background-image:
      radial-gradient(620px 620px at 92% 2%,rgba(255,138,46,.30),transparent 70%),
      radial-gradient(660px 660px at 2% 22%,rgba(237,76,28,.15),transparent 70%),
      radial-gradient(700px 700px at 90% 46%,rgba(255,138,46,.24),transparent 70%),
      radial-gradient(640px 640px at 4% 70%,rgba(237,76,28,.13),transparent 70%),
      radial-gradient(700px 700px at 86% 92%,rgba(255,138,46,.22),transparent 70%),
      radial-gradient(rgba(237,76,28,.06) 1.3px,transparent 1.4px);
    background-size:auto,auto,auto,auto,auto,28px 28px;
    background-repeat:no-repeat,no-repeat,no-repeat,no-repeat,no-repeat,repeat;
  }
  /* 공통 헤더·푸터·플로팅 버튼은 브랜드 블루 유지 */
  header,footer,.kakao-fab,.quote-fab,.fab-social{--blue:#2D5BFF;--blue-bright:#5B86FF;--blue-deep:#003892;--ice:#EAF0FF}
  .phead .glow{background:rgba(255,122,46,.18)}
  .phead::after{background-image:radial-gradient(rgba(237,76,28,.13) 1.4px,transparent 1.5px)}
  .tabs{background:rgba(255,250,245,.92)}
  .tab{border-color:#f3ddd0}
  .mc-th{background:radial-gradient(circle at 50% 32%,rgba(255,138,46,.16),transparent 60%),linear-gradient(160deg,#fff0e4,#ffe2cf)}
  .mc:hover{border-color:rgba(237,76,28,.42)}
  .mc-p{color:var(--blue-deep)}
  .chip{background:#fff1e8;border-color:#ffded0;color:#8a4a2c}
  .set-card:hover,.buf.mid{border-color:rgba(237,76,28,.45)}
  .combo-no{-webkit-text-stroke-color:rgba(237,76,28,.5)}
  .season-card.summer::before{background:rgba(255,122,46,.28)}
  .season-card.winter::before{background:rgba(237,76,28,.18)}
</style>
</head>

  function won(n){return n.toLocaleString('ko-KR');}
  function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function chips(arr){return '<div class="chips">'+arr.map(function(d){return '<span class="chip">'+esc(d)+'</span>';}).join('')+'</div>';}

  function itemCard(it, emoji){
    var badge = it.best ? '<span class="mc-best">BEST</span>' : '';
    var thumb = it.img ? '<img class="mc-img" src="'+it.img+'?v=5" alt="'+esc(it.name)+'" loading="lazy">' : '<span class="mc-emoji">'+(emoji||'🍽️')+'</span>';
    return '<div class="mc reveal"><div class="mc-th">'+badge+thumb+'</div>'+
           '<div class="mc-b"><span class="mc-n">'+esc(it.name)+'</span>'+
           '<span class="mc-p num">'+won(it.price)+'<i>원</i></span></div></div>';
  }
  function grid(items, emoji){return '<div class="mgrid">'+items.map(function(it){return itemCard(it,emoji);}).join('')+'</div>';}

  var SETLABELS = {summer:"여름 메뉴", winter:"겨울 메뉴", coffee:"커피", non_coffee:"논커피", ade:"에이드", tea:"티 · 기타"};
  function setCard(s){
    var groups = '';
    ["summer","winter","coffee","non_coffee","ade","tea"].forEach(function(k){
      if(s[k]) groups += '<div class="set-grp"><div class="gl">'+SETLABELS[k]+'</div>'+chips(s[k])+'</div>';
    });
    return '<div class="set-card reveal"><div class="set-top"><h3>'+esc(s.name)+'</h3>'+
           '<span class="set-price num">'+won(s.price)+'<i>원/인</i></span></div>'+groups+'</div>';
  }

  function panel(cat, title, desc, pill, inner){
    var head = '<div class="panel-head"><h2>'+title+'</h2>'+
               (desc?'<p>'+desc+'</p>':'')+
               (pill?'<span class="pill">'+pill+'</span>':'')+'</div>';
    return '<section class="panel" data-cat="'+cat+'">'+head+inner+'</section>';
  }

  var html = '';

  /* 시즌 (현재 시즌이 위로) */
  (function(){
    var summer = {label:'☀ 여름 한정', em:'🍧', items:MENU.season.summer};
    var winter = {label:'❄ 겨울 한정', em:'🫓', items:MENU.season.winter};
    var ord = (SEASON_NOW==='winter') ? [winter,summer] : [summer,winter];
    var inner =
      '<div class="sub" style="margin-top:0">'+ord[0].label+' <span class="now-tag">지금 시즌</span></div>'+grid(ord[0].items,ord[0].em)+
      '<div class="sub">'+ord[1].label+'</div>'+grid(ord[1].items,ord[1].em);
    html += panel('season','시즌 한정 메뉴','계절에 맞춰 운영하는 시즌 메뉴입니다. 더위엔 시원하게, 추위엔 따뜻하게 현장을 챙깁니다.','', inner);
  })();

  /* 커피·음료 세트 */

    '인원과 메뉴 수에 맞춰 세트를 고르세요. 가격은 1인 기준이며, 세트 안에서 음료를 자유롭게 선택할 수 있습니다.',

    '<div class="set-grid">'+MENU.drink_sets.map(setCard).join('')+'</div>');

  /* 간식 */

  /* 디저트 */

  /* 식사(밥) */

  /* 면류 · 안주류 */

    '<div class="sub">안주류</div>'+grid(MENU.meal_etc,'🍖'));

  (function(){
    var sets = MENU.buffet.sets.map(function(b,i){

    }).join('');

      return '<div class="opt-row"><div class="ok">'+esc(o.k)+'</div><div class="ov">'+esc(o.v)+'</div></div>';

  })();

  document.getElementById('menuRoot').innerHTML = html;

  /* 인기 조합 렌더 */
  (function(){
    var cr=document.getElementById('comboRoot'); if(!cr)return;
    cr.innerHTML = COMBOS.map(function(c,i){
      var parts = String(c.items).split('＋').map(function(s){return s.trim();});
      var formula = parts.map(function(p){return '<span class="ci">'+esc(p)+'</span>';}).join('<span class="cx">+</span>');
      return '<div class="combo reveal">'+
               '<div class="combo-no">'+('0'+(i+1))+'</div>'+
               '<div class="combo-main">'+
                 (c.tag?'<span class="combo-rank">'+esc(c.tag)+'</span>':'')+
                 '<div class="combo-formula">'+formula+'</div>'+
                 '<div class="combo-meta">담당자들이 가장 많이 찾는 구성 · 인원·예산 맞춰 조정 가능</div>'+
               '</div>'+
             '</div>';
    }).join('');
  })();

  /* ===== 탭: 해당 메뉴 섹션으로 스크롤 + 스크롤스파이 ===== */
  var tabsWrap = document.getElementById('tabs');
  var tabs = [].slice.call(tabsWrap.querySelectorAll('.tab'));
  var panels = [].slice.call(document.querySelectorAll('.panel'));
  /* 전체 섹션 항상 표시 */
  panels.forEach(function(p){ p.classList.remove('hide'); p.querySelectorAll('.reveal').forEach(function(e){e.classList.add('in');}); });
  function topOffset(){ return 70 + tabsWrap.offsetHeight + 6; }
  function setActive(cat){
    tabs.forEach(function(t){ var on = t.dataset.cat === cat; t.classList.toggle('active', on); t.setAttribute('aria-pressed', on); });
  }
  tabs.forEach(function(t){
    t.addEventListener('click', function(){
      var cat = t.dataset.cat;
      if(cat === 'all'){ window.scrollTo({top:0, behavior:'smooth'}); return; }
      var p = panels.filter(function(x){return x.dataset.cat === cat;})[0];
      if(p){ var y = p.getBoundingClientRect().top + window.scrollY - topOffset(); window.scrollTo({top:y, behavior:'smooth'}); }
    });
  });
  var ticking = false;
  function spy(){
    var line = topOffset() + 14;
    var cat = 'all';
    panels.forEach(function(p){ if(p.getBoundingClientRect().top <= line) cat = p.dataset.cat; });
    setActive(cat);
  }
  window.addEventListener('scroll', function(){ if(!ticking){ window.requestAnimationFrame(function(){ spy(); ticking = false; }); ticking = true; } }, {passive:true});
  spy();
</script>
