<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>공지사항 · 뉴스 — 푸드트럭하우스</title>
<meta name="description" content="푸드트럭하우스의 현장 소식과 운영 공지. 바이오니아·롯데건설·한화·고든램지버거 등 함께한 최신 현장 뉴스를 확인하세요.">
<meta name="theme-color" content="#0A1733">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="apple-touch-icon" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" href="/assets/css/style.css">
<style>
  /* ── 페이지 고유 스타일 (공통은 /assets/css/style.css) ── */
  .phead{position:relative;padding:138px 0 40px;overflow:hidden}
  .phead .glow{position:absolute;width:460px;height:460px;border-radius:50%;background:rgba(45,91,255,.13);filter:blur(90px);top:-160px;right:-40px;z-index:0}
  .phead::after{content:"";position:absolute;inset:0;z-index:1;pointer-events:none;background-image:radial-gradient(rgba(45,91,255,.13) 1.4px,transparent 1.5px);background-size:26px 26px;-webkit-mask:radial-gradient(130% 90% at 80% 18%,#000,transparent 76%);mask:radial-gradient(130% 90% at 80% 18%,#000,transparent 76%)}
  .phead .wrap{position:relative;z-index:2}
  .crumb{font-size:13.5px;color:#7a87a8;margin-bottom:16px}
  .crumb a:hover{color:var(--blue)}
  .phead h1{font-size:clamp(32px,5vw,52px);font-weight:800;letter-spacing:-.03em;color:var(--navy-900)}
  .phead p{margin-top:16px;font-size:17px;color:#5b6789;max-width:50ch}

  .news-wrap{padding:14px 0 100px}
  .ntabs{display:flex;gap:8px;margin-bottom:8px}
  .ntab{padding:9px 18px;border-radius:30px;font-size:14.5px;font-weight:600;color:#33406b;border:1px solid #e0e8f6;background:#fff;cursor:pointer;transition:color .2s,background .2s,border-color .2s;font-family:inherit}
  .ntab:hover{color:var(--blue);border-color:rgba(45,91,255,.4)}
  .ntab.active{background:var(--blue);color:#fff;border-color:var(--blue);box-shadow:0 6px 18px -8px rgba(45,91,255,.85)}
  .news-list{max-width:840px;margin-top:8px}
  .ni{display:flex;gap:22px;align-items:flex-start;padding:24px 2px;border-bottom:1px solid rgba(10,17,36,.08)}
  .ni.hide{display:none}
  .ni-thumb{flex:0 0 210px;aspect-ratio:431/216;border-radius:12px;overflow:hidden;background:linear-gradient(135deg,#eaf0fc,#dbe6f7);border:1px solid #e7edf9;position:relative}
  .ni-thumb img{width:100%;height:100%;object-fit:cover;display:block}
  .ni-thumb .no{position:absolute;inset:0;display:grid;place-items:center;font-size:12px;color:#7a87a8}
  .ni-body{flex:1;min-width:0}
  .ni-top{display:flex;align-items:center;gap:10px;margin-bottom:11px;flex-wrap:wrap}
  .ni-cat{font-size:11.5px;font-weight:700;padding:4px 10px;border-radius:6px}
  .ni-cat.news{color:var(--blue-bright);background:rgba(45,91,255,.1);border:1px solid rgba(45,91,255,.28)}
  .ni-cat.notice{color:#34D399;background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.3)}
  .ni-date{font-family:'Archivo',sans-serif;font-size:13px;color:#7a87a8}
  .ni h3{font-size:18.5px;font-weight:700;color:var(--navy-900);letter-spacing:-.02em;margin-bottom:9px;line-height:1.42}
  .ni p{font-size:14.5px;color:#5b6789;line-height:1.68}
  .empty{padding:50px 0;text-align:center;color:#5b6789;font-size:15px}

  .cta-wrap{padding:0 0 100px}
  .cta{max-width:840px;margin:0 auto;border-radius:24px;padding:clamp(36px,5vw,52px);background:linear-gradient(135deg,var(--blue),var(--blue-deep));position:relative;overflow:hidden;text-align:center}
  .cta::before{content:"";position:absolute;width:280px;height:280px;border-radius:50%;background:rgba(255,255,255,.12);top:-100px;right:-50px;filter:blur(10px)}
  .cta h2{font-size:clamp(22px,3vw,30px);font-weight:800;letter-spacing:-.03em;color:#fff;position:relative}
  .cta p{margin-top:12px;font-size:15.5px;color:rgba(255,255,255,.85);position:relative}
  .cta a{display:inline-block;margin-top:24px;background:#fff;color:var(--blue-deep);padding:15px 30px;border-radius:12px;font-weight:800;font-size:16px;position:relative;transition:transform .15s}
  .cta a:hover{transform:translateY(-2px)}

  @media(max-width:640px){.ni{flex-direction:column;gap:13px}.ni-thumb{flex:0 0 auto;width:100%}}
  @media(max-width:600px){.phead{padding:100px 0 30px}.phead h1{font-size:clamp(27px,7.4vw,42px)}.phead p{font-size:15px}}
</style>
</head>
<body>

<div class="hd-slot" data-include="/partials/header.html"></div>

<section class="phead">
  <div class="glow"></div>
  <div class="wrap">
    <div class="crumb"><a href="index.html">홈</a> · 공지사항</div>
    <h1>공지사항 · 뉴스</h1>
    <p>푸드트럭하우스의 최신 현장 소식과 운영 안내를 전해드립니다.</p>
  </div>
</section>

<div class="news-wrap">
  <div class="wrap">
    <div class="ntabs" id="ntabs">
      <button class="ntab active" data-cat="all" aria-pressed="true">전체</button>
      <button class="ntab" data-cat="news" aria-pressed="false">뉴스</button>
      <button class="ntab" data-cat="notice" aria-pressed="false">공지</button>
    </div>
    <div class="news-list" id="newsList"><!-- JS가 채웁니다 --></div>
  </div>
</div>

<div class="cta-wrap">
  <div class="cta">
    <h2>다음 현장, 함께 만들어요</h2>
    <p>인원과 날짜만 알려주시면 3초 만에 견적을 받아보실 수 있습니다.</p>
    <a href="https://foodtruck-quote.vercel.app/" target="_blank" rel="noopener">3초 견적완성 →</a>
  </div>
</div>

<div data-include="/partials/footer.html"></div>

<script>
  /* 공지·뉴스 데이터 (나중에 관리자 페이지에서 추가/수정) */
  var NEWS = [
    {cat:'notice', date:'2026.06.02', title:'전국 출장 운영 안내', body:'서울·경기부터 충청·강원·전라·경상, 제주·섬지역까지 전국 어디든 출장이 가능합니다. 지역별 출장비는 상담 시 안내드립니다.'},
    {cat:'notice', date:'2026.06.02', title:'예약·견적 안내', body:'행사 날짜와 차량 수급을 위해 가능한 일찍 문의 주실수록 좋습니다. 인원·날짜만 알려주시면 \'3초 견적완성\'으로 즉시 예상 견적을 확인하실 수 있어요.'},
    {cat:'notice', date:'2026.06.02', title:'실내 행사 대안 운영', body:'푸드트럭 진입이 어려운 공간은 부스형 실내 케이터링으로 대체 운영이 가능합니다. 현장 여건을 먼저 보고 맞는 형태를 제안드립니다.'},
    {cat:'news', date:'2026.03.12', title:'바이오니아 본사, 커피차 운영과 함께 \'비에날씬\' 모델 김희선 초청', body:'배우 김희선 님과 함께한 바이오니아 사내 행사 현장에 커피차를 운영하며 브랜드 분위기를 더했습니다.', img:'https://foodtruckhouse.com/files/thumbnails/670/001/431x216.crop.jpg'},
    {cat:'news', date:'2026.01.29', title:'한화건설·영신디엔씨 등 찾아가는 간식차 \'쿨 쉼터\'', body:'건설현장 혹서기 대응 행사에 간식차·커피차를 운영하며 근로자분들께 시원한 쉼터를 제공했습니다.', img:'https://foodtruckhouse.com/files/thumbnails/127/001/431x216.crop.jpg'},
    {cat:'news', date:'2026.01.29', title:'롯데건설, 입주민 대상 \'캐슬링 서비스\' 간식차 제공', body:'롯데캐슬 입주민을 위한 \'캐슬링\' 행사에 간식차로 함께하며 입주민 만족도를 높였습니다.', img:'https://foodtruckhouse.com/files/thumbnails/118/001/431x216.crop.jpg'},
    {cat:'news', date:'2026.01.29', title:'잡코리아 × 알바몬 \'카페드림즈\' 투어', body:'잡코리아·알바몬과 함께한 카페드림즈 투어에 푸드트럭 렌탈 및 운영으로 참여했습니다.', img:'https://foodtruckhouse.com/files/thumbnails/109/001/431x216.crop.jpg'},
    {cat:'news', date:'2026.01.29', title:'\'괴물이 돌아왔다\' 한화, 몬스터트럭+푸드트럭 팝업', body:'류현진 복귀 특수를 누린 한화이글스 팝업 이벤트에서 푸드트럭·몬스터트럭 렌탈 및 운영을 맡았습니다.', img:'https://foodtruckhouse.com/files/thumbnails/102/001/431x216.crop.jpg'},
    {cat:'news', date:'2026.01.29', title:'고든램지버거 부산 센텀점, 신메뉴 출시 기념 팝업 푸드트럭', body:'고든램지버거 부산 센텀점의 신메뉴 출시를 기념한 푸드트럭 팝업 운영을 지원했습니다.', img:'https://foodtruckhouse.com/files/thumbnails/089/001/431x216.crop.jpg'}
  ];

  function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  var CATLABEL = {news:'뉴스', notice:'공지'};
  var listEl = document.getElementById('newsList');
  function render(cat){
    var items = NEWS.filter(function(n){return cat==='all' || n.cat===cat;});
    if(!items.length){ listEl.innerHTML='<div class="empty">해당 글이 없습니다.</div>'; return; }
    listEl.innerHTML = items.map(function(n){
      var thumb = n.img ? '<div class="ni-thumb"><img src="'+n.img+'" alt="'+esc(n.title)+'" loading="lazy" onerror="this.style.display=\'none\';var s=document.createElement(\'span\');s.className=\'no\';s.textContent=\'현장 사진\';this.parentNode.appendChild(s)"></div>' : '';
      return '<article class="ni" data-cat="'+n.cat+'">'+thumb+
        '<div class="ni-body"><div class="ni-top"><span class="ni-cat '+n.cat+'">'+CATLABEL[n.cat]+'</span><span class="ni-date num">'+esc(n.date)+'</span></div>'+
        '<h3>'+esc(n.title)+'</h3><p>'+esc(n.body)+'</p></div></article>';
    }).join('');
  }
  render('all');

  var tabs = [].slice.call(document.querySelectorAll('#ntabs .ntab'));
  tabs.forEach(function(t){
    t.addEventListener('click', function(){
      tabs.forEach(function(x){var on=x===t;x.classList.toggle('active',on);x.setAttribute('aria-pressed',on);});
      render(t.dataset.cat);
    });
  });
</script>
<script src="/assets/js/include.js" defer></script>
</body>
</html>
