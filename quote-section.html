<!-- ============================================================
  공통 컴포넌트: 3초 견적 섹션 (폰목업 + 터치 모션)
  · 이 파일 하나만 수정하면 이 컴포넌트를 불러쓰는 전 페이지에 반영됩니다.
  · 각 페이지의 <div id="quote-mount"></div> 자리에 JS로 주입됩니다.
  · 색/폰트는 페이지의 :root 디자인 토큰(var(--blue) 등)을 그대로 따릅니다.
============================================================ -->
<style>
  .quote-sec{position:relative;overflow:hidden;padding:clamp(64px,8vw,100px) 0;background:
      radial-gradient(120% 110% at 100% 0%,rgba(91,134,255,.24),transparent 48%),
      radial-gradient(110% 100% at 0% 100%,rgba(45,91,255,.14),transparent 52%),
      linear-gradient(160deg,#EAF0FF 0%,#DCE7FF 50%,#CFDDFF 100%)}
  .quote-sec::before{content:"";position:absolute;width:520px;height:520px;border-radius:50%;z-index:0;background:radial-gradient(circle,rgba(91,134,255,.5),transparent 70%);top:-180px;right:-120px;filter:blur(8px)}
  .quote-sec::after{content:"";position:absolute;inset:0;z-index:1;pointer-events:none;background-image:radial-gradient(rgba(45,91,255,.14) 1.5px,transparent 1.6px);background-size:26px 26px;-webkit-mask:radial-gradient(135% 95% at 78% 22%,#000,transparent 78%);mask:radial-gradient(135% 95% at 78% 22%,#000,transparent 78%)}
  .quote-sec .wrap{position:relative;z-index:2}
  .quote-grid{display:grid;grid-template-columns:1fr 380px;gap:60px;align-items:center}
  .qs-eyebrow{display:inline-block;color:var(--blue);font-weight:700;font-size:13px;letter-spacing:.06em;text-transform:uppercase;margin-bottom:14px}
  .quote-copy h2{font-size:clamp(26px,3.4vw,40px);font-weight:800;letter-spacing:-.03em;line-height:1.22;color:var(--navy-900)}
  .quote-copy h2 .hl{color:var(--blue)}
  .quote-copy>p{margin-top:18px;color:#3c4a72;font-size:16.5px;max-width:480px;line-height:1.7}
  .qfeat{list-style:none;display:flex;flex-direction:column;gap:13px;margin:28px 0 30px;padding:0}
  .qfeat li{display:flex;align-items:center;gap:13px;font-weight:600;color:var(--navy-850);font-size:15px}
  .qfeat .chk{width:26px;height:26px;border-radius:8px;background:var(--blue);color:#fff;display:grid;place-items:center;flex:none}
  .phone{width:320px;margin:0 auto;background:#0E1A3D;border-radius:42px;padding:12px;box-shadow:0 34px 80px -34px rgba(6,12,31,.7);position:relative}
  .phone::before{content:"";position:absolute;top:24px;left:50%;transform:translateX(-50%);width:120px;height:26px;background:#0E1A3D;border-radius:0 0 16px 16px;z-index:3}
  .phone-screen{position:relative;background:#fff;border-radius:32px;overflow:hidden;aspect-ratio:9/19;display:flex;flex-direction:column}
  .ps-top{background:linear-gradient(135deg,var(--blue),var(--blue-deep));color:#fff;padding:46px 22px 22px;flex:none}
  .ps-top .small{font-size:12px;opacity:.85;font-weight:600}
  .ps-top .big{font-size:20px;font-weight:800;margin-top:4px;letter-spacing:-.02em}
  .ps-body{padding:18px;flex:1;display:flex;flex-direction:column;gap:11px;background:var(--paper)}
  .ps-row{background:#fff;border-radius:13px;padding:13px 14px;box-shadow:0 2px 10px rgba(13,40,120,.05);display:flex;align-items:center;justify-content:space-between;border:1.6px solid transparent}
  .ps-row .l{font-size:13px;font-weight:600;color:#33406b}
  .ps-row .r{font-family:'Archivo',sans-serif;font-size:13px;font-weight:700;color:var(--blue)}
  .ps-row.sel{border-color:var(--blue);box-shadow:0 6px 18px rgba(45,91,255,.18)}
  .ps-pill{display:inline-block;background:var(--ice);color:var(--blue);font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px}
  .ps-cta{margin-top:2px;background:var(--blue);color:#fff;border:none;border-radius:12px;padding:12px;font-weight:700;font-size:14px;width:100%;font-family:inherit;cursor:pointer;opacity:.45;transition:opacity .3s,transform .15s}
  .ps-cta.active{opacity:1}
  .ps-cta.tap{transform:scale(.95)}
  .ps-total{margin-top:auto;background:var(--navy-900);color:#fff;border-radius:14px;padding:15px 17px;display:flex;align-items:center;justify-content:space-between;opacity:0;transform:translateY(8px);transition:.4s}
  .ps-total.show{opacity:1;transform:none}
  .ps-total .t{font-size:12px;opacity:.75}
  .ps-total .v{font-family:'Archivo',sans-serif;font-size:21px;font-weight:800}
  .ps-total .v .w{font-size:.6em;font-weight:600;margin-left:2px}
  .finger{position:absolute;width:32px;height:32px;border-radius:50%;background:radial-gradient(circle at 34% 32%,rgba(255,255,255,.95),rgba(45,91,255,.55));border:2px solid rgba(255,255,255,.85);box-shadow:0 6px 18px rgba(6,12,31,.4);top:60%;left:60%;opacity:0;pointer-events:none;z-index:10;transform:translate(-50%,-50%);transition:top .65s cubic-bezier(.5,0,.25,1),left .65s cubic-bezier(.5,0,.25,1),opacity .3s,transform .14s}
  .finger.tap{transform:translate(-50%,-50%) scale(.68)}
  @media(max-width:900px){.quote-grid{grid-template-columns:1fr;gap:40px}.phone-col{order:-1}}
</style>

<section class="quote-sec">
  <div class="wrap">
    <div class="quote-grid">
      <div class="quote-copy">
        <span class="qs-eyebrow">FOODTRUCKHOUSE QUOTE</span>
        <h2>전화 없이,<br><span class="hl">3초 만에 견적</span> 완성</h2>
        <p>메뉴·인원·지역만 고르면 출장비까지 포함된 예상 견적이 즉시 나옵니다. 카카오 알림톡으로 바로 받아보세요.</p>
        <ul class="qfeat">
          <li><span class="chk"><svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17l-5-5" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></span>메뉴 75종에서 골라 담는 즉석 구성</li>
          <li><span class="chk"><svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17l-5-5" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></span>전국 10개 권역 출장비 자동 반영</li>
          <li><span class="chk"><svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17l-5-5" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></span>행사 메뉴판 시안까지 무료 제공</li>
        </ul>
        <a href="https://foodtruck-quote.vercel.app/" target="_blank" rel="noopener" class="btn btn-primary">지금 견적 받기
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </a>
      </div>

      <div class="phone-col">
        <div class="phone">
          <div class="phone-screen">
            <div class="ps-top">
              <div class="small">FOODTRUCKHOUSE</div>
              <div class="big">3초 견적완성</div>
            </div>
            <div class="ps-body">
              <span class="ps-pill">메뉴를 선택하세요</span>
              <div class="ps-row" id="opt1"><span class="l">미니 핫도그 · 200개</span><span class="r">₩ 380,000</span></div>
              <div class="ps-row" id="opt2"><span class="l">아메리카노 · 150잔</span><span class="r">₩ 285,000</span></div>
              <div class="ps-row" id="opt3"><span class="l">출장 · 경기 남부</span><span class="r">+₩ 100,000</span></div>
              <button class="ps-cta" id="psCta">견적 확인</button>
              <div class="ps-total" id="psTotal">
                <span class="t">예상 견적</span>
                <span class="v"><span id="psNum">0</span><span class="w">원</span></span>
              </div>
            </div>
            <div class="finger" id="finger"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<script>
(function(){
  var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion:reduce)').matches;
  var finger=document.getElementById('finger'); if(!finger)return;
  var opt1=document.getElementById('opt1'),opt2=document.getElementById('opt2'),
      cta=document.getElementById('psCta'),total=document.getElementById('psTotal'),psNum=document.getElementById('psNum');
  var wait=function(ms){return new Promise(function(r){setTimeout(r,ms);});};
  function moveTo(el){var sr=finger.parentElement.getBoundingClientRect(),er=el.getBoundingClientRect();finger.style.left=(er.left-sr.left+er.width*0.72)+'px';finger.style.top=(er.top-sr.top+er.height/2)+'px';}
  function countNum(target,dur){dur=dur||1000;var start=performance.now();(function tick(now){var p=Math.min((now-start)/dur,1),e=1-Math.pow(1-p,3);psNum.textContent=Math.floor(e*target).toLocaleString();if(p<1)requestAnimationFrame(tick);else psNum.textContent=target.toLocaleString();})(performance.now());}
  function tap(){return new Promise(function(res){finger.classList.add('tap');setTimeout(function(){finger.classList.remove('tap');res();},160);});}
  async function run(){
    opt1.classList.remove('sel');opt2.classList.remove('sel');cta.classList.remove('active');total.classList.remove('show');psNum.textContent='0';
    finger.style.opacity='0';await wait(900);finger.style.opacity='1';
    moveTo(opt1);await wait(750);await tap();opt1.classList.add('sel');await wait(550);
    moveTo(opt2);await wait(750);await tap();opt2.classList.add('sel');await wait(550);
    cta.classList.add('active');moveTo(cta);await wait(750);
    finger.classList.add('tap');cta.classList.add('tap');await wait(200);
    finger.classList.remove('tap');cta.classList.remove('tap');
    finger.style.opacity='0';await wait(150);
    total.classList.add('show');countNum(765000,1000);
    await wait(2900);run();
  }
  if(reduce){opt1.classList.add('sel');opt2.classList.add('sel');cta.classList.add('active');total.classList.add('show');psNum.textContent='765,000';}
  else{var obs=new IntersectionObserver(function(e){if(e[0].isIntersecting){obs.disconnect();run();}},{threshold:.4});obs.observe(document.querySelector('.phone'));}
})();
</script>
