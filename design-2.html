<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800&family=Fraunces:ital,opsz,wght@1,9..144,500;0,9..144,600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#16120D;--card:#1F1A13;--fg:#F1E9DC;--mut:#A1937F;--acc:#D9A552;--line:rgba(217,165,82,.18);--max:1180px}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Pretendard Variable',Pretendard,sans-serif;background:var(--bg);color:var(--fg);-webkit-font-smoothing:antialiased;overflow-x:hidden;line-height:1.65}
  .num{font-family:'Archivo',sans-serif}.fr{font-family:'Fraunces',serif}
  a{text-decoration:none;color:inherit}
  .wrap{max-width:var(--max);margin:0 auto;padding:0 clamp(20px,4vw,34px)}
  header{position:fixed;inset:0 0 auto;height:68px;display:flex;align-items:center;z-index:50;background:rgba(22,18,13,.72);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
  header .wrap{display:flex;align-items:center;justify-content:space-between;width:100%}
  .brand{font-weight:700;font-size:17px;letter-spacing:.01em;display:flex;align-items:center;gap:9px}
  .brand .y{font-family:'Fraunces',serif;font-style:italic;color:var(--acc);font-size:15px}
  .nav{display:flex;gap:28px;font-size:14px;color:var(--mut);font-weight:500}.nav a:hover{color:var(--fg)}
  .cta{font-weight:700;font-size:14px;color:#1c160e;background:var(--acc);padding:11px 20px;border-radius:30px}
  .hero{padding:140px 0 78px}
  .lab{font-size:12px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--acc);margin-bottom:30px}
  h1{font-size:clamp(42px,7.2vw,92px);font-weight:700;line-height:1.04;letter-spacing:-.025em;color:#fff}
  h1 em{font-family:'Fraunces',serif;font-style:italic;font-weight:500;color:var(--acc);letter-spacing:0}
  .sub{margin-top:26px;font-size:clamp(16px,1.9vw,19px);color:var(--mut);max-width:46ch;line-height:1.8}
  .btns{display:flex;gap:14px;margin-top:38px;flex-wrap:wrap;align-items:center}
  .b1{background:var(--acc);color:#1c160e;font-weight:800;font-size:16px;padding:16px 32px;border-radius:30px}
  .b2{color:var(--fg);font-weight:600;font-size:15px;border-bottom:1px solid var(--acc);padding-bottom:3px}
  .rule{height:1px;background:var(--line);margin:62px 0 0}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:0}
  .st{padding:30px 24px 6px;border-right:1px solid var(--line)}.st:last-child{border-right:0}
  .st .v{font-family:'Fraunces',serif;font-weight:600;font-size:clamp(30px,4vw,48px);color:#fff;line-height:1}
  .st .v i{font-style:normal;font-size:.4em;color:var(--acc);font-family:'Pretendard Variable'}
  .st .l{margin-top:12px;font-size:12.5px;color:var(--mut);letter-spacing:.02em}
  .tone{position:fixed;left:16px;bottom:16px;z-index:80;background:var(--fg);color:#1c160e;font-size:12px;font-weight:800;padding:9px 14px;border-radius:30px}
  @media(max-width:820px){.nav{display:none}.stats{grid-template-columns:1fr 1fr}.st:nth-child(2){border-right:0}.st{border-bottom:1px solid var(--line)}}
</style></head><body>
<header><div class="wrap">

  <a class="cta" href="https://foodtruck-quote.vercel.app/" target="_blank" rel="noopener">3초 견적완성</a>
</div></header>

<section class="hero"><div class="wrap">
  <div class="lab">Catering · Brand · Festival</div>
  <h1>젊음이 만든 <em>passion</em>,<br>깨끗한 푸드트럭의 기준.</h1>
  <p class="sub">기업 행사부터 건설현장·축제·페스티벌까지 — 현장을 가장 많이 굴려본 팀이, 가장 빠르게 견적으로 답합니다.</p>
  <div class="btns">
    <a class="b1" href="https://foodtruck-quote.vercel.app/" target="_blank" rel="noopener">3초 견적완성</a>
    <a class="b2" href="index.html">현장 후기 보기 →</a>
  </div>
  <div class="rule"></div>
  <div class="stats">
    <div class="st"><div class="v num">4,000<i>곳+</i></div><div class="l">함께한 고객사</div></div>
    <div class="st"><div class="v num">8,000<i>건+</i></div><div class="l">누적 행사</div></div>
    <div class="st"><div class="v num">92<i>%</i></div><div class="l">재이용률</div></div>
    <div class="st"><div class="v num">15<i>대</i></div><div class="l">직영 트럭</div></div>
  </div>
</div></section>
<a class="tone" href="index.html">시안2 · 웜 프리미엄 — 현재 버전 →</a>
</body></html>
