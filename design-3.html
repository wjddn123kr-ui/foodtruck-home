<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{--bg:#F5F4EF;--card:#fff;--fg:#11131A;--mut:#5B6070;--acc:#1D4ED8;--acc-soft:#E7EDFF;--line:rgba(17,19,26,.1);--max:1180px}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Pretendard Variable',Pretendard,sans-serif;background:var(--bg);color:var(--fg);-webkit-font-smoothing:antialiased;overflow-x:hidden;line-height:1.6}
  .num{font-family:'Archivo',sans-serif}
  a{text-decoration:none;color:inherit}
  .wrap{max-width:var(--max);margin:0 auto;padding:0 clamp(20px,4vw,34px)}
  header{position:fixed;inset:0 0 auto;height:66px;display:flex;align-items:center;z-index:50;background:rgba(245,244,239,.82);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
  header .wrap{display:flex;align-items:center;justify-content:space-between;width:100%}
  .brand{font-weight:800;font-size:17px;letter-spacing:-.02em}.brand i{color:var(--acc)}
  .nav{display:flex;gap:26px;font-size:14px;color:var(--mut);font-weight:600}.nav a:hover{color:var(--fg)}
  .cta{background:var(--acc);color:#fff;font-weight:700;font-size:14px;padding:11px 20px;border-radius:9px}
  .hero{padding:128px 0 64px}
  .pill{display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:var(--acc);background:var(--acc-soft);padding:8px 16px;border-radius:30px;margin-bottom:26px}
  h1{font-size:clamp(44px,7.6vw,98px);font-weight:900;line-height:.98;letter-spacing:-.045em}
  h1 em{font-style:normal;color:var(--acc)}
  .sub{margin-top:24px;font-size:clamp(16px,2vw,19px);color:var(--mut);max-width:46ch}
  .btns{display:flex;gap:12px;margin-top:34px;flex-wrap:wrap}
  .b1{background:var(--acc);color:#fff;font-weight:800;font-size:16px;padding:16px 30px;border-radius:12px;box-shadow:0 16px 34px -14px rgba(29,78,216,.6)}
  .b2{background:#fff;border:1px solid var(--line);color:var(--fg);font-weight:600;padding:16px 26px;border-radius:12px}
  .stats{margin-top:60px;display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .st{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:24px}
  .st .v{font-family:'Archivo';font-weight:800;font-size:clamp(28px,3.6vw,40px);letter-spacing:-.02em}
  .st .v i{font-style:normal;font-size:.42em;color:var(--acc)}
  .st .l{margin-top:8px;font-size:12.5px;color:var(--mut)}
  .clients{margin-top:18px;padding:26px 0;border-top:1px solid var(--line)}
  .clients .lab{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--mut);margin-bottom:14px}
  .clients .row{display:flex;flex-wrap:wrap;gap:8px 26px;font-size:19px;font-weight:800;color:rgba(17,19,26,.32)}
  .tone{position:fixed;left:16px;bottom:16px;z-index:80;background:var(--fg);color:#fff;font-size:12px;font-weight:800;padding:9px 14px;border-radius:30px}
  @media(max-width:820px){.nav{display:none}.stats{grid-template-columns:1fr 1fr}}
</style></head><body>

    <div class="st"><div class="v num">15<i>대</i></div><div class="l">직영 푸드트럭</div></div>

  <div class="clients">
    <div class="lab">우리가 함께한 곳</div>
    <div class="row"><span>삼성생명</span><span>한화</span><span>현대</span><span>CJ</span><span>무신사</span><span>국민은행</span><span>FC서울</span><span>진로</span><span>롯데건설</span></div>
  </div>
</div></section>

</body></html>
